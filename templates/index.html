<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        li {
            background: #ffffff;
            border: 2px solid #f0f0f0;
            padding: 2.5rem 2rem;
            border-radius: 16px;
            width: 220px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        li::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            transition: left 0.3s ease;
        }

        li:hover {
            border-color: #667eea;
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
        }

        li:hover::before {
            left: 100%;
        }

        a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            position: relative;
            display: inline-block;
        }

        a::after {
            content: '→';
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.3s ease, margin-left 0.3s ease;
        }

        a:hover::after {
            opacity: 1;
            margin-left: 12px;
        }
    </style>
</head>
<body>
    <h1>Welcome </h1>

    <ul>
        <li><a href="/posts">View-Posts</a></li>
        <li><a href="/comments">View-Comments</a></li>
        <li><a href="/albums">View-Albums</a></li>
    </ul>
</body>
</html>
